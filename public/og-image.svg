<svg width="1200" height="630" viewBox="0 0 1200 630" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Isabella Rondon — Data Analyst · AI Automation · Impact</title>
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#1E1E1E"/>
    </pattern>
    <clipPath id="frame">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0F0F0F"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Coral circles top-right, clipped to canvas -->
  <g clip-path="url(#frame)">
    <circle cx="1050" cy="0" r="280" fill="#E05C4B" opacity="0.08"/>
    <circle cx="1180" cy="100" r="220" fill="#E05C4B" opacity="0.08"/>
    <circle cx="1080" cy="160" r="190" fill="#E05C4B" opacity="0.08"/>
  </g>

  <!-- Name -->
  <text x="80" y="270" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="82" fill="#F0EDE8" letter-spacing="-1.5">Isabella Rondon</text>

  <!-- Tagline: "Data Analyst · " + "AI Automation" (highlighted) + " · Impact" -->
  <text x="80" y="338" font-family="'Space Grotesk', sans-serif" font-weight="400" font-size="28" fill="#9C9690">Data Analyst · </text>
  <text x="310" y="338" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="28" fill="#F0907A">AI Automation</text>
  <text x="530" y="338" font-family="'Space Grotesk', sans-serif" font-weight="400" font-size="28" fill="#9C9690"> · Impact</text>

  <!-- Bottom coral line -->
  <rect x="0" y="622" width="1200" height="1.5" fill="#E05C4B" opacity="0.30"/>
</svg>
